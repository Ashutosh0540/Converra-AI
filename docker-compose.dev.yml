services:
  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
  frontend:
    build:
      context: ./frontend
      target: build
    command: npm run dev -- --hostname 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
