services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-converra_ai}
      POSTGRES_USER: ${POSTGRES_USER:-converra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [converra]

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-converra}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-converra_ai}
      HOST: 0.0.0.0
      CHROMA_PATH: /app/data/chroma
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - chroma_data:/app/data/chroma
    ports: ["${BACKEND_PORT:-8000}:8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [converra]

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:${BACKEND_PORT:-8000}}
    depends_on:
      backend:
        condition: service_healthy
    ports: ["3000:3000"]
    networks: [converra]

volumes:
  postgres_data:
  chroma_data:

networks:
  converra:
    driver: bridge
